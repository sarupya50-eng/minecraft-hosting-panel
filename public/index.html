<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Hosting Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="login-container" class="container hidden">
            <div class="login-box">
                <h1>Minecraft Hosting Panel</h1>
                <form id="login-form">
                    <input type="text" id="username" placeholder="Username" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
                <p>Don't have an account? <a href="#" onclick="toggleRegister()">Register here</a></p>
            </div>
        </div>

        <div id="register-container" class="container hidden">
            <div class="login-box">
                <h1>Create Account</h1>
                <form id="register-form">
                    <input type="text" id="reg-username" placeholder="Username" required>
                    <input type="email" id="reg-email" placeholder="Email (optional)">
                    <input type="password" id="reg-password" placeholder="Password" required>
                    <button type="submit">Register</button>
                </form>
                <p>Already have an account? <a href="#" onclick="toggleRegister()">Login here</a></p>
            </div>
        </div>

        <div id="dashboard-container" class="container hidden">
            <nav class="navbar">
                <h1>Minecraft Hosting Panel</h1>
                <button onclick="logout()" class="logout-btn">Logout</button>
            </nav>

            <div class="dashboard">
                <div class="header">
                    <h2>Your Servers</h2>
                    <button onclick="showCreateServerForm()" class="btn btn-primary">+ Create Server</button>
                </div>

                <div id="create-server-form" class="create-server hidden">
                    <h3>Create New Server</h3>
                    <form id="server-form">
                        <input type="text" id="server-name" placeholder="Server Name" required>
                        <input type="number" id="server-port" placeholder="Port (25565-25575)" required>
                        <input type="number" id="server-ram" placeholder="RAM (MB)" value="1024">
                        <input type="text" id="server-motd" placeholder="MOTD" value="Welcome to Minecraft!">
                        <button type="submit">Create</button>
                        <button type="button" onclick="hideCreateServerForm()">Cancel</button>
                    </form>
                </div>

                <div id="servers-list" class="servers-grid">
                    <!-- Servers will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
